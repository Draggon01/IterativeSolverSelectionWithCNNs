services:

  # Step 1 — generate baseline dataset with paper's features and 128×128 density images
  mm_datagen:
    build: ../container
    container_name: mm_datagen
    command: python mm_generate.py
    volumes:
      - ./data:/workspace/data
      # Shared from main pipeline (matrix generators + PETSc solver interface)
      - ../src/model.py:/workspace/model.py
      - ../src/generate_data.py:/workspace/generate_data.py
      # Baseline-specific scripts
      - ./mm_model.py:/workspace/mm_model.py
      - ./mm_generate.py:/workspace/mm_generate.py
    environment:
      - N_SAMPLES=${N_SAMPLES:-5000}
      - DATA_DIR=/workspace/data
      - SEED=${SEED:-42}
      - MAX_ITER=${MAX_ITER:-2000}
      - TOL=${TOL:-1e-8}
  # Step 1b — append SuiteSparse matrices to the baseline dataset (optional)
  mm_ingest:
    build: ../container
    container_name: mm_ingest
    command: python mm_ingest.py
    volumes:
      - ./data:/workspace/data
      - ../src/model.py:/workspace/model.py
      - ../src/generate_data.py:/workspace/generate_data.py
      - ../src/ingest_suitesparse.py:/workspace/ingest_suitesparse.py
      - ./mm_model.py:/workspace/mm_model.py
      - ./mm_ingest.py:/workspace/mm_ingest.py
    environment:
      - MODE=auto           # auto (ssgetpy) or manual (MTX_DIR)
      - DATA_DIR=/workspace/data
      - MIN_N=${MIN_N:-100}
      - MAX_N=${MAX_N:-50000}
      - N_MATRICES=${N_MATRICES:-1000}
      - ONLY_SPD=${ONLY_SPD:-0}
      - SEED=${SEED:-0}
      # - MTX_DIR=/workspace/data/mtx   # for manual mode
  # Step 1c — ingest the 621 hardcoded benchmark matrices from SuiteSparse
  mm_githubdata_ingest:
    build: ../container
    container_name: mm_githubdata_ingest
    command: python mm_ingest.py
    volumes:
      - ./data:/workspace/data
      - ../src/model.py:/workspace/model.py
      - ../src/generate_data.py:/workspace/generate_data.py
      - ../src/ingest_suitesparse.py:/workspace/ingest_suitesparse.py
      - ./mm_model.py:/workspace/mm_model.py
      - ./mm_ingest.py:/workspace/mm_ingest.py
    environment:
      - MODE=githubdata
      - DATA_DIR=/workspace/data
      - CACHE_DIR=/workspace/data/suitesparse_cache
      - MIN_N=${MIN_N:-100}
      - MAX_N=${MAX_N:-500000}
      - N_MATRICES=${N_MATRICES:-621}
      - SEED=${SEED:-0}
      - MAX_ITER=${MAX_ITER:-2000}
      - TOL=${TOL:-1e-8}

  # Step 2 — train MM-AutoSolver model (Adam, lr=1e-3, 256 epochs, batch=512)
  mm_trainer:
    build: ../container
    container_name: mm_trainer
    command: python mm_train.py
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - ./logs:/workspace/logs
      - ../src/model.py:/workspace/model.py
      - ./mm_model.py:/workspace/mm_model.py
      - ./mm_train.py:/workspace/mm_train.py
    environment:
      - DATA_DIR=/workspace/data
      - CHECKPOINT_DIR=/workspace/checkpoints
      - LOG_DIR=/workspace/logs
      - MAX_EPOCHS=${MAX_EPOCHS:-256}
      - BATCH_SIZE=${BATCH_SIZE:-512}
      - LEARNING_RATE=${LEARNING_RATE:-0.001}
      - VAL_SPLIT=${VAL_SPLIT:-0.10}
      - CHECKPOINT_EVERY=${CHECKPOINT_EVERY:-10}
      - KEEP_LAST_N=${KEEP_LAST_N:-3}
      - DEVICE=${DEVICE:-auto}
    depends_on:
      - mm_datagen
    stop_grace_period: 60s
    # To enable GPU, add a deploy.resources.reservations block here

  # Step 3 — evaluate: Acc, MP, MR, F1 (paper's four metrics)
  mm_evaluate:
    build: ../container
    container_name: mm_evaluate
    command: python mm_evaluate.py
    volumes:
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
      - ../src/model.py:/workspace/model.py
      - ./mm_model.py:/workspace/mm_model.py
      - ./mm_train.py:/workspace/mm_train.py
      - ./mm_evaluate.py:/workspace/mm_evaluate.py
    environment:
      - DATA_DIR=/workspace/data
      - CHECKPOINT_DIR=/workspace/checkpoints
      - VAL_SPLIT=0.10
      - DEVICE=auto
    depends_on:
      - mm_trainer

  # TensorBoard — monitor training loss and accuracy live
  mm_tensorboard:
    image: tensorflow/tensorflow:latest
    container_name: mm_tensorboard
    command: tensorboard --logdir=/logs --host=0.0.0.0
    ports:
      - "6007:6006"
    volumes:
      - ./logs:/logs
    depends_on:
      - mm_trainer
